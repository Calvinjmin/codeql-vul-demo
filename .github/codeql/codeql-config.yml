# CodeQL configuration for security scanning
# Uses security-and-quality for full severity range (High, Medium, Low)
# - High (7.0+): SQL injection, command injection, ReDoS, weak crypto, etc.
# - Medium (4.0-6.9): URL redirection (6.1), open redirect
# - Low: Code quality findings (unused imports, etc.) when present
name: "CodeQL Config"

disable-default-queries: false

queries:
  - uses: security-and-quality
